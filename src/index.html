<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra, Papel, Tijera, Lagarto, Spock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .btn-jugada {
            font-size: 1.2rem;
            margin: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-jugada:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        #resultado {
            margin-top: 2rem;
            font-size: 1.5rem;
            border-radius: 10px;
            padding: 15px;
            display: none;
        }
        .eleccion-texto {
            font-size: 1.2rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <div class="game-card">
        <h1 class="mb-4 text-primary fw-bold">¡Haz tu jugada!</h1>
        <p class="text-muted mb-4">Piedra, Papel, Tijera, Lagarto o Spock</p>
        
        <div class="d-flex flex-wrap justify-content-center gap-2">
            <button class="btn btn-outline-dark btn-jugada" onclick="jugar('rock')">🪨 Roca</button>
            <button class="btn btn-outline-dark btn-jugada" onclick="jugar('paper')">📄 Papel</button>
            <button class="btn btn-outline-dark btn-jugada" onclick="jugar('scissors')">✂️ Tijeras</button>
            <button class="btn btn-outline-dark btn-jugada" onclick="jugar('lizard')">🦎 Lagarto</button>
            <button class="btn btn-outline-dark btn-jugada" onclick="jugar('spock')">🖖 Spock</button>
        </div>

        <div id="resultado" class="alert shadow-sm"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
