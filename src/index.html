<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra, Papel, Tijera, Lagarto, Spock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-card">
        <h1 class="mb-3 text-primary fw-bold">¡Haz tu jugada!</h1>
        <p class="text-secondary mb-4">Piedra, Papel, Tijera, Lagarto o Spock</p>

        <div class="d-grid gap-2 d-md-block">
            <button class="btn btn-outline-primary m-1" onclick="jugar('rock')">Piedra</button>
            <button class="btn btn-outline-success m-1" onclick="jugar('paper')">Papel</button>
            <button class="btn btn-outline-danger m-1" onclick="jugar('scissors')">Tijeras</button>
            <button class="btn btn-outline-warning m-1" onclick="jugar('lizard')">Lagarto</button>
            <button class="btn btn-outline-info m-1" onclick="jugar('spock')">Spock</button>
        </div>

        <div id="resultado" class="mt-4 p-3 border-0 shadow-none text-center fw-bold">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
